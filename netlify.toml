# Netlify config for the KonkerePlus app (Next.js).
# NOTE: this takes effect only when `feat/foundation` is merged to main and we cut
# konkereplus.com over from the static prototype to the real app. `main` still serves
# the static prototype (publish = "prototype") until then.

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonical host: www → apex.
[[redirects]]
  from = "https://www.konkereplus.com/*"
  to = "https://konkereplus.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
